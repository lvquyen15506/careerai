{% load static %}
<!DOCTYPE html>
<html class="light" lang="vi">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>{% block title %}CareerAI - Nền tảng AI kết nối và quản trị việc làm sinh viên{% endblock %}</title>
    
    <!-- Tailwind Play CDN with form and container query plugins -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />

    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "secondary-fixed": "#fce7f3",
                        "secondary-fixed-dim": "#fbcfe8",
                        "primary-container": "#ffe4e6",
                        "primary": "#881337",
                        "tertiary-fixed-dim": "#4edea3",
                        "on-secondary-fixed-variant": "#9d174d",
                        "surface-bright": "#fffafb",
                        "inverse-primary": "#fbcff1",
                        "on-primary-fixed-variant": "#03497b",
                        "inverse-on-surface": "#fbf8f9",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed-variant": "#005236",
                        "on-primary": "#ffffff",
                        "tertiary": "#003723",
                        "on-tertiary-fixed": "#002113",
                        "surface-dim": "#f5ebee",
                        "accent-electric": "#db2777",
                        "error-container": "#ffdad6",
                        "primary-fixed-dim": "#9dcaff",
                        "surface-container-highest": "#f3e1e5",
                        "surface-container-high": "#f9e7ea",
                        "on-error": "#ffffff",
                        "tertiary-container": "#005035",
                        "on-secondary-container": "#fffbff",
                        "surface-glass": "rgba(255, 245, 247, 0.7)",
                        "surface-tint": "#2b6195",
                        "background": "#fff5f7",
                        "on-error-container": "#93000a",
                        "on-primary-fixed": "#001d35",
                        "text-rich": "#2d0617",
                        "on-secondary": "#ffffff",
                        "outline": "#727780",
                        "on-surface": "#2d0617",
                        "on-surface-variant": "#5c4d54",
                        "on-tertiary-container": "#33ca91",
                        "on-secondary-fixed": "#4d002c",
                        "surface-container-low": "#fff0f3",
                        "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a",
                        "surface-variant": "#f3e1e5",
                        "tertiary-fixed": "#6ffbbe",
                        "inverse-surface": "#2d0617",
                        "surface": "#fff0f3",
                        "surface-container": "#ffe4e6",
                        "outline-variant": "#f3cbd4",
                        "primary-fixed": "#d1e4ff",
                        "on-background": "#2d0617",
                        "secondary-container": "#db2777",
                        "on-primary-container": "#86b7f0",
                        "secondary": "#db2777"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "base": "8px",
                        "container-max": "1280px",
                        "margin-mobile": "16px",
                        "margin-desktop": "40px"
                    },
                    "fontFamily": {
                        "display-lg": ["Hanken Grotesk"],
                        "label-md": ["Hanken Grotesk"],
                        "body-md": ["Hanken Grotesk"],
                        "display-lg-mobile": ["Hanken Grotesk"],
                        "body-lg": ["Hanken Grotesk"],
                        "label-caps": ["JetBrains Mono"],
                        "headline-md": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "label-md": ["14px", { "lineHeight": "20px", "fontWeight": "500" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "display-lg-mobile": ["36px", { "lineHeight": "42px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "label-caps": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .form-control, .form-select {
            display: block;
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 0.875rem;
            line-height: 1.25rem;
            color: #2d0617;
            background-color: #ffffff;
            border: 1px solid rgba(219, 39, 119, 0.2);
            border-radius: 0.75rem;
            transition: all 0.2s ease-in-out;
            outline: none;
        }
        body, .bg-background {
            background-color: #ffffff !important;
            color: #5c4d54 !important;
            font-family: 'Hanken Grotesk', 'Inter', sans-serif !important;
        }
        .form-control:focus, .form-select:focus {
            border-color: #db2777;
            box-shadow: 0 0 0 2px rgba(219, 39, 119, 0.2);
            outline: none;
        }
        .form-select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23db2777'%3e%3cpath d='M7 10l5 5 5-5H7z'/%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.75rem center;
            background-size: 1.5rem;
        }
        .btn-gradient {
            background: linear-gradient(135deg, #ff007f 0%, #db2777 100%);
            transition: all 0.3s ease;
        }
        .btn-gradient:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(219, 39, 119, 0.3);
        }
        .btn-primary {
            background: linear-gradient(135deg, #ff007f 0%, #db2777 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(219, 39, 119, 0.3);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
        }
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body class="bg-background text-on-background font-body-md antialiased min-h-screen relative">

    {% block background_glow %}{% endblock %}

    {% block content %}{% endblock %}

    {% block extra_js %}{% endblock %}
</body>
</html>
