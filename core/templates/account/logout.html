{% extends "core/base.html" %}
{% block title %}Đăng xuất - ICTU Jobs{% endblock %}

{% block content %}
<div style="min-height: 60vh; display: flex; align-items: center; justify-content: center;">
    <div class="card-glass animate-fade-in" style="max-width: 420px; width: 100%;">
        <div class="card-body p-4 text-center">
            <div style="width: 64px; height: 64px; background: var(--secondary-gradient); border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
                <i class="bi bi-box-arrow-right" style="font-size: 1.5rem; color: #fff;"></i>
            </div>
            <h4 class="fw-bold mb-3">Đăng xuất</h4>
            <p class="text-muted mb-4">Bạn có chắc chắn muốn đăng xuất?</p>
            <form method="post">
                {% csrf_token %}
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-gradient-danger btn-gradient">
                        <i class="bi bi-box-arrow-right"></i> Đăng xuất
                    </button>
                    <a href="{% url 'home' %}" class="btn btn-outline-glass">
                        <i class="bi bi-arrow-left"></i> Quay lại
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
